  - "Claude"

ai_usage_summary: |
  Claude used for architecture discussion and code review.
  No candidate data was fed to any LLM.
  Ranking is deterministic rule-based with no LLM calls at inference time.

methodology_summary: |
  Multi-signal ranker with 7 explicit scoring components reflecting the JD's
  stated and implied requirements. Title/role alignment (26%) acts as a hard
  gate against keyword stuffers — a Marketing Manager with AI skills scores
  near zero regardless of skill keywords. Skills scoring (26%) uses a trust
  multiplier: proficiency × duration_months × endorsements × platform assessment,
  structured into 7 JD-required buckets (embeddings, vector DB, ranking/IR,
  LLM/NLP, ML frameworks, MLOps/eval, Python). Experience component (24%)
  scores YoE sweet-spot (5–9yr), product-company ratio, and production ML
  evidence in role descriptions. Availability (14%) incorporates last_active
  recency, open_to_work_flag, recruiter_response_rate, and notice_period.
  Honeypot detection removes 7,585 impossible profiles before ranking.
  Total runtime ~40 seconds on CPU for 100K candidates.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
